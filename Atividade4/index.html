<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Testando Grid Layout</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <header>
    <h1>Jornal do Quintal</h1>
    </header>

    <div class="container-box">
        <div class="box a">
            <p>É um pássaro? É um avião?</p>
            <figure>
                <img src="imagem2.jpg" alt="Sapo Mago">
                <figcaption>Sapo estiloso voa e assusta moradores. "Achei que era uma ave" disse observador.</figcaption>
            </figure>
        </div>
        <div class="box b">
            <p>João Barros Pedreiro</p>
            <figure>
                <img src="imagem4.jfif" alt="Joao de Barro" widht="200px" height="auto">
                <figcaption>Serviços de construção. Tocas, Casinhas e muito mais. Ligue 4002-8922</figcaption>
            </figure>
        </div>
        
        <div class="box d"><p>Golpe do amor</p>
            <figure>
                <img src="imagem5.jpg" alt="viuva negra" widht="100px" height="200px">
                <figcaption>Viuva negra assassina parceiro após relações. Casos aumentam em 9999% em epóca de cruzamento.</figcaption>
            </figure>
        </div>
        <div class="box e">            
            <p>"Lavo sim" diz Sapo</p>
            <figure>
                <img src="imagem6.jpeg" alt="sapo com pé na agua" widht="200px" height="200px">
                <figcaption>Sapo rebate alegações que dizem que ele não lava o pé. "Isso é Inteligência artificial" disse internauta.</figcaption>
            </figure></div>
        <div class="box f">
            <p>Proibido Baygon</p>
            <figure>
                <img src="imagem3.jfif" alt="Gafanhoto com roupa elegante" widht="200px" height="200px">
                <figcaption>Presidente Gafanhoto sanciona lei anti pesticida. Mercado rebate aumentando preço das frutas.</figcaption>
            </figure>
        </div>

    </div>

</body>
